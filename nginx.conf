# ─────────────────────────────────────────────────────────────────────────────
# CryptoBot Pro — Nginx reverse-proxy configuration
#
# Usage (Linux):
#   sudo cp nginx.conf /etc/nginx/sites-available/cryptobot
#   sudo ln -s /etc/nginx/sites-available/cryptobot /etc/nginx/sites-enabled/cryptobot
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS options:
#   A) Self-signed (dev/local):   python generate-certs.py
#   B) Let's Encrypt (production): sudo certbot --nginx -d yourdomain.com
#
# Update the paths below before using in production.
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name localhost;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Replace with Let's Encrypt paths for production:
    #   ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_certificate     /path/to/backend/certs/server.crt;
    ssl_certificate_key /path/to/backend/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers (nginx layer) ───────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Frontend (Vite dev or built dist) ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Backend REST API ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }
}
